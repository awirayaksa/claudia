name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0

permissions:
  contents: write # Required for creating releases      

jobs:
  release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for better release notes

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*.exe
            dist/*.zip
            dist/*.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        if: success()
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $repo = "${{ github.repository }}"
          $actor = "${{ github.actor }}"
          $releaseUrl = "https://github.com/$repo/releases/tag/v$version"
          $imageUrl = "https://opengraph.githubassets.com/1/$repo/releases/tag/v$version"

          $caption = "🚀 <b>New Release Published!</b>`n`n📦 <b>Repository:</b> $repo`n🏷️ <b>Version:</b> <code>v$version</code>`n👤 <b>Released by:</b> $actor`n`n🔗 <a href='$releaseUrl'>View Release on GitHub</a>"

          $buttons = '{"inline_keyboard":[[{"text":"📦 View Release","url":"' + $releaseUrl + '"},{"text":"📥 Download","url":"' + $releaseUrl + '"}]]}'

          $body = @{
            chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"
            photo = $imageUrl
            caption = $caption
            parse_mode = "HTML"
            reply_markup = $buttons
          }

          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto" `
            -Method POST `
            -ContentType "application/json" `
            -Body ($body | ConvertTo-Json)
